spring:
  datasource:
    url: jdbc:h2:mem:estapar;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

simulator:
  base-url: http://localhost:0
  bootstrap-enabled: false

logging:
  level:
    com.estapar.parking: WARN
